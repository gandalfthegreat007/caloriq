</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect}=React;
const FK="calDB_foods",LK="calDB_log",PK="calDB_profile",WK="calDB_weights";
const DF=[
  {id:1,name:"Boiled Egg",cal:78,protein:6,carbs:1,fat:5,unit:"piece"},
  {id:2,name:"Roti (Wheat)",cal:71,protein:2.7,carbs:15,fat:0.4,unit:"piece"},
  {id:3,name:"Maida Roti",cal:90,protein:2.4,carbs:18,fat:1.2,unit:"piece"},
  {id:4,name:"Dahi (Curd)",cal:61,protein:3.5,carbs:4.7,fat:3.3,unit:"100g"},
  {id:5,name:"Chole Bhature",cal:450,protein:12,carbs:65,fat:16,unit:"serving"},
  {id:6,name:"Dal Tadka",cal:130,protein:8,carbs:18,fat:3,unit:"bowl"},
  {id:7,name:"Paneer",cal:265,protein:18,carbs:3.7,fat:20,unit:"100g"},
  {id:8,name:"Basmati Rice",cal:121,protein:2.5,carbs:26,fat:0.4,unit:"100g"},

  {id:17,name:"Palak Paneer",cal:180,protein:9,carbs:8,fat:12,unit:"bowl"},
  {id:18,name:"Butter Chicken",cal:250,protein:22,carbs:8,fat:15,unit:"bowl"},
  {id:19,name:"Chicken Biryani",cal:290,protein:18,carbs:35,fat:9,unit:"bowl"},
  {id:20,name:"Egg Bhurji",cal:180,protein:12,carbs:3,fat:13,unit:"serving"},
  {id:21,name:"Moong Dal",cal:114,protein:8,carbs:19,fat:0.4,unit:"bowl"},
  {id:22,name:"Sabzi (Mixed Veg)",cal:80,protein:2.5,carbs:12,fat:2.5,unit:"bowl"},
  {id:23,name:"Chapati with Ghee",cal:120,protein:3,carbs:17,fat:4.5,unit:"piece"},
  {id:24,name:"Puri",cal:110,protein:2.4,carbs:14,fat:5,unit:"piece"},
  {id:25,name:"Lassi (sweet)",cal:160,protein:5,carbs:26,fat:4,unit:"glass"},
  {id:26,name:"Masala Chai",cal:50,protein:1.5,carbs:7,fat:1.5,unit:"cup"},
  {id:27,name:"Banana",cal:89,protein:1.1,carbs:23,fat:0.3,unit:"piece"},
  {id:28,name:"Apple",cal:52,protein:0.3,carbs:14,fat:0.2,unit:"piece"},
  {id:29,name:"Orange",cal:47,protein:0.9,carbs:12,fat:0.1,unit:"piece"},
  {id:30,name:"Milk (full fat)",cal:61,protein:3.2,carbs:4.8,fat:3.3,unit:"100ml"},
  {id:31,name:"Skim Milk",cal:35,protein:3.4,carbs:5,fat:0.1,unit:"100ml"},
  {id:32,name:"Almonds",cal:164,protein:6,carbs:6,fat:14,unit:"handful"},
  {id:33,name:"Peanuts",cal:161,protein:7,carbs:5,fat:14,unit:"28g"},
  {id:34,name:"Oats (cooked)",cal:71,protein:2.5,carbs:12,fat:1.5,unit:"100g"},
  {id:35,name:"Cornflakes",cal:357,protein:7,carbs:84,fat:0.4,unit:"100g"},
  {id:36,name:"Sandwich (veg)",cal:210,protein:7,carbs:35,fat:5,unit:"piece"},
  {id:37,name:"Vada Pav",cal:290,protein:6,carbs:45,fat:10,unit:"piece"},
  {id:38,name:"Pav Bhaji",cal:350,protein:8,carbs:55,fat:11,unit:"serving"},
  {id:39,name:"Chicken (grilled)",cal:165,protein:31,carbs:0,fat:3.6,unit:"100g"},
  {id:40,name:"Fish (rohu)",cal:97,protein:16,carbs:0,fat:3.5,unit:"100g"},
  {id:41,name:"Mutton Curry",cal:260,protein:20,carbs:5,fat:18,unit:"bowl"},
  {id:42,name:"Besan Chilla",cal:180,protein:9,carbs:22,fat:5,unit:"piece"},
  {id:43,name:"Sprouts Salad",cal:80,protein:6,carbs:12,fat:0.5,unit:"bowl"},
  {id:44,name:"Cucumber",cal:16,protein:0.7,carbs:3.6,fat:0.1,unit:"100g"},
  {id:45,name:"Tomato",cal:18,protein:0.9,carbs:3.9,fat:0.2,unit:"piece"},
  {id:46,name:"Mango",cal:60,protein:0.8,carbs:15,fat:0.4,unit:"100g"},
  {id:47,name:"Khichdi",cal:160,protein:5,carbs:28,fat:3,unit:"bowl"},
  {id:48,name:"Thepla",cal:130,protein:4,carbs:20,fat:4,unit:"piece"},
  {id:49,name:"Dhokla",cal:75,protein:3,carbs:14,fat:1,unit:"piece"},
  {id:50,name:"Gulab Jamun",cal:150,protein:2,carbs:26,fat:5,unit:"piece"},
  {id:51,name:"Bread Pakora",cal:310,protein:7,carbs:42,fat:13,unit:"piece"},
  {id:52,name:"Gobi Paratha",cal:280,protein:6,carbs:40,fat:10,unit:"piece"},
  {id:53,name:"Pizza Slice (veg)",cal:250,protein:9,carbs:33,fat:9,unit:"slice"},
  {id:54,name:"Pizza Slice (chicken)",cal:290,protein:14,carbs:32,fat:12,unit:"slice"},
  {id:55,name:"Sandwich (chicken)",cal:290,protein:18,carbs:32,fat:9,unit:"piece"},
  {id:56,name:"Paneer Paratha",cal:320,protein:10,carbs:40,fat:13,unit:"piece"},
  {id:57,name:"Dal Makhani",cal:195,protein:9,carbs:22,fat:8,unit:"bowl"},
  {id:58,name:"Fried Rice (veg)",cal:220,protein:5,carbs:42,fat:4,unit:"bowl"},
  {id:59,name:"Maggi Noodles",cal:375,protein:8,carbs:57,fat:13,unit:"packet"},
  {id:60,name:"Burger (veg)",cal:310,protein:9,carbs:45,fat:10,unit:"piece"},
  {id:61,name:"Burger (chicken)",cal:400,protein:22,carbs:40,fat:18,unit:"piece"},
  {id:62,name:"Jalebi",cal:150,protein:1.5,carbs:35,fat:3.5,unit:"piece"},
  {id:63,name:"Rasgulla",cal:110,protein:3,carbs:22,fat:2,unit:"piece"},
  {id:64,name:"Halwa (sooji)",cal:220,protein:3,carbs:35,fat:8,unit:"serving"},
  {id:65,name:"Uttapam",cal:170,protein:5,carbs:30,fat:4,unit:"piece"},
];

const ld=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const tod=()=>new Date().toISOString().slice(0,10);
const fmt=n=>Math.round(n);
const calcBMI=(w,h)=>w/((h/100)**2);
const bmiCat=b=>b<18.5?{l:"Underweight",c:"#60a5fa"}:b<25?{l:"Normal",c:"#4ade80"}:b<30?{l:"Overweight",c:"#fbbf24"}:{l:"Obese",c:"#f87171"};
const calcTDEE=(w,h,age,g)=>Math.round(((g==="male"?10*w+6.25*h-5*age+5:10*w+6.25*h-5*age-161))*1.375);

// Design tokens
const C={
  bg:"#080810",bg2:"#0e0e1a",card:"#12121f",card2:"#1a1a2e",
  accent:"#7c6af7",accent2:"#a78bfa",green:"#4ade80",red:"#f87171",yellow:"#fbbf24",
  text:"#f0eeff",sub:"#8b85b0",dim:"#3d3a5c",border:"#1e1e35",
};

function Ring({pct,size=88,stroke=8,color=C.accent,bg=C.dim,children}){
  const r=(size-stroke)/2,circ=2*Math.PI*r,dash=circ*(Math.min(pct,100)/100);
  return(
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={bg} strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          style={{transition:"stroke-dasharray 0.6s ease",filter:`drop-shadow(0 0 6px ${color}88)`}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>{children}</div>
    </div>
  );
}

function Bar({val,max,color=C.accent,height=12}){
  const pct=Math.min(100,(val/max)*100);
  return(
    <div style={{background:C.dim,borderRadius:99,height,overflow:"hidden"}}>
      <div style={{width:pct+"%",height:"100%",background:`linear-gradient(90deg,${color},${color}bb)`,borderRadius:99,transition:"width 0.5s ease",boxShadow:`0 0 8px ${color}66`}}/>
    </div>
  );
}

function Pill({children,active,onClick}){
  return <button onClick={onClick} style={{padding:"8px 18px",borderRadius:99,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:active?C.accent:C.card2,color:active?"#fff":C.sub,transition:"all 0.2s",boxShadow:active?`0 0 16px ${C.accent}55`:"none"}}>{children}</button>;
}

function Card({children,style={}}){
  return <div style={{background:C.card,borderRadius:20,padding:18,marginBottom:14,border:`1px solid ${C.border}`,...style}}>{children}</div>;
}

function Input({style={},...p}){
  return <input style={{width:"100%",background:C.bg2,border:`1px solid ${C.border}`,borderRadius:12,color:C.text,padding:"11px 14px",fontSize:14,...style}} {...p}/>;
}

function BtnPrimary({children,onClick,style={}}){
  return <button onClick={onClick} style={{width:"100%",padding:"13px",background:`linear-gradient(135deg,${C.accent},${C.accent2})`,border:"none",borderRadius:14,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:`0 4px 20px ${C.accent}44`,...style}}>{children}</button>;
}

function BtnSm({children,onClick,style={}}){
  return <button onClick={onClick} style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:10,color:C.sub,padding:"6px 10px",cursor:"pointer",fontSize:13,...style}}>{children}</button>;
}

const TABS=[{id:"Log",ic:"🍽️"},{id:"Dashboard",ic:"📊"},{id:"Weight",ic:"⚖️"},{id:"Foods",ic:"🥗"},{id:"Profile",ic:"👤"}];

function App(){
  const [tab,setTab]=useState("Log");
  const [view,setView]=useState("Week");
  const [foods,setFoods]=useState(()=>ld(FK,DF));
  const [log,setLog]=useState(()=>ld(LK,{}));
  const [profile,setProfile]=useState(()=>ld(PK,{weight:"",height:"",age:"",gender:"male",target:"",startDate:tod()}));
  const [weights,setWeights]=useState(()=>ld(WK,[]));
  const [date,setDate]=useState(tod());
  const [search,setSearch]=useState("");
  const [selFood,setSelFood]=useState(null);
  const [qty,setQty]=useState(1);
  const [editEntry,setEditEntry]=useState(null);
  const [showFF,setShowFF]=useState(false);
  const [newFood,setNewFood]=useState({name:"",cal:"",protein:"",carbs:"",fat:"",unit:"piece"});
  const [editFood,setEditFood]=useState(null);
  const [wtInput,setWtInput]=useState("");
  const [wtDate,setWtDate]=useState(tod());
  const [msg,setMsg]=useState("");

  const notify=m=>{setMsg(m);setTimeout(()=>setMsg(""),2000);};
  const dayLog=log[date]||[];
  const dayTotals=useMemo(()=>dayLog.reduce((a,e)=>({cal:a.cal+e.cal,protein:a.protein+e.protein,carbs:a.carbs+e.carbs,fat:a.fat+e.fat}),{cal:0,protein:0,carbs:0,fat:0}),[dayLog]);

  const saveProf=p=>{setProfile(p);sv(PK,p);};
  const {weight:w,height:h,age,gender,target:tw,startDate}=profile;
  const bmi=w&&h?calcBMI(+w,+h).toFixed(1):null;
  const bc=bmi?bmiCat(+bmi):null;
  const tdee=w&&h&&age?calcTDEE(+w,+h,+age,gender):null;
  const defCal=tdee?tdee-500:null;
  const kgToLose=tw&&w?+w-+tw:null;
  const weeksNeeded=kgToLose>0?Math.ceil(kgToLose/0.45):null;
  const allLogDays=Object.keys(log).sort();
  const loggedDays=allLogDays.filter(d=>(log[d]||[]).length>0).length;
  const totalCal=allLogDays.reduce((s,d)=>s+(log[d]||[]).reduce((a,e)=>a+e.cal,0),0);
  const avgCal=loggedDays>0?totalCal/loggedDays:0;
  const actDeficit=tdee?tdee-avgCal:0;
  const actKgWk=(actDeficit*7)/7700;
  const onTrack=actDeficit>=450;
  const sortedW=[...weights].sort((a,b)=>a.date.localeCompare(b.date));
  const latestW=sortedW.length>0?sortedW[sortedW.length-1].weight:null;
  const startW=sortedW.length>0?+sortedW[0].weight:(w?+w:null);
  const actKgLost=startW&&latestW?startW-+latestW:null;
  const expLostByNow=()=>{
    if(!startDate||!tdee)return 0;
    const days=Math.max(0,(new Date(tod())-new Date(startDate))/86400000);
    return(500*days)/7700;
  };

  const addEntry=()=>{
    if(!selFood)return;
    const f=foods.find(x=>x.id===selFood);
    const e={id:Date.now(),foodId:f.id,name:f.name,qty,cal:fmt(f.cal*qty),protein:+(f.protein*qty).toFixed(1),carbs:+(f.carbs*qty).toFixed(1),fat:+(f.fat*qty).toFixed(1),unit:f.unit};
    const u={...log,[date]:[...(log[date]||[]),e]};
    setLog(u);sv(LK,u);setSelFood(null);setQty(1);setSearch("");notify("✓ Added!");
  };
  const delEntry=id=>{const u={...log,[date]:dayLog.filter(e=>e.id!==id)};setLog(u);sv(LK,u);};
  const updEntry=()=>{
    const f=foods.find(x=>x.id===editEntry.foodId);
    const u={...log,[date]:dayLog.map(e=>e.id===editEntry.id?{...e,qty:editEntry.qty,cal:fmt(f.cal*editEntry.qty),protein:+(f.protein*editEntry.qty).toFixed(1),carbs:+(f.carbs*editEntry.qty).toFixed(1),fat:+(f.fat*editEntry.qty).toFixed(1)}:e)};
    setLog(u);sv(LK,u);setEditEntry(null);notify("✓ Updated!");
  };
  const addWt=()=>{
    if(!wtInput)return;
    const ex=weights.find(x=>x.date===wtDate);
    const u=ex?weights.map(x=>x.date===wtDate?{...x,weight:+wtInput}:x):[...weights,{date:wtDate,weight:+wtInput}];
    setWeights(u);sv(WK,u);setWtInput("");notify("✓ Weight saved!");
  };
  const addFood=()=>{
    if(!newFood.name||!newFood.cal)return;
    const f={id:Date.now(),...newFood,cal:+newFood.cal,protein:+newFood.protein||0,carbs:+newFood.carbs||0,fat:+newFood.fat||0};
    const u=[...foods,f];setFoods(u);sv(FK,u);
    setNewFood({name:"",cal:"",protein:"",carbs:"",fat:"",unit:"piece"});setShowFF(false);notify("✓ Food added!");
  };
  const updFood=()=>{
    const u=foods.map(f=>f.id===editFood.id?{...editFood,cal:+editFood.cal,protein:+editFood.protein,carbs:+editFood.carbs,fat:+editFood.fat}:f);
    setFoods(u);sv(FK,u);setEditFood(null);notify("✓ Updated!");
  };
  const getDayData=d=>(log[d]||[]).reduce((a,e)=>({cal:a.cal+e.cal,protein:a.protein+e.protein}),{cal:0,protein:0});
  const weekDays=useMemo(()=>{const d=new Date(date);d.setDate(d.getDate()-d.getDay());return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return x.toISOString().slice(0,10);});},[date]);
  const monthDays=useMemo(()=>{const d=new Date(date);const y=d.getFullYear();const m=d.getMonth();return Array.from({length:new Date(y,m+1,0).getDate()},(_,i)=>`${y}-${String(m+1).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`);},[date]);
  const aggDays=view==="Week"?weekDays:view==="Month"?monthDays:[date];
  const aggData=aggDays.map(d=>({date:d,...getDayData(d)}));
  const aggTotal=aggData.reduce((a,x)=>({cal:a.cal+x.cal,protein:a.protein+x.protein}),{cal:0,protein:0});
  const barMax=Math.max(...aggData.map(x=>x.cal),defCal||1500,100);
  const filteredFoods=foods.filter(f=>f.name.toLowerCase().includes(search.toLowerCase()));
  const prevFood=selFood?foods.find(f=>f.id===selFood):null;
  const calPct=defCal?Math.min(100,(dayTotals.cal/defCal)*100):0;
  const ringColor=calPct>100?C.red:calPct>80?C.yellow:C.accent;
  const wMax=startW?startW+1:80;const wMin=tw?+tw-1:(startW?startW-10:60);

  const dayNames=["Su","Mo","Tu","We","Th","Fr","Sa"];

  return(
    <div style={{maxWidth:480,minHeight:"100vh",margin:"0 auto",paddingBottom:90,background:C.bg}}>

      {/* Toast */}
      {msg&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:`linear-gradient(135deg,${C.accent},${C.accent2})`,color:"#fff",padding:"10px 24px",borderRadius:99,fontSize:13,fontWeight:700,zIndex:999,boxShadow:`0 8px 32px ${C.accent}55`,whiteSpace:"nowrap"}}>{msg}</div>}

      {/* LOG */}
      {tab==="Log"&&(
        <div>
          {/* Header */}
          <div style={{padding:"28px 20px 20px",background:`linear-gradient(180deg,#0e0e1a,${C.bg})`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div>
                <div style={{fontSize:12,fontWeight:600,color:C.sub,letterSpacing:2,textTransform:"uppercase"}}>Today's Log</div>
                <input type="date" value={date} onChange={e=>setDate(e.target.value)}
                  style={{background:"none",border:"none",color:C.text,fontSize:22,fontWeight:800,cursor:"pointer",padding:0,marginTop:2}}/>
              </div>
              <div style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:14,padding:"8px 14px",textAlign:"center"}}>
                <div style={{fontSize:10,color:C.sub}}>entries</div>
                <div style={{fontSize:20,fontWeight:800,color:C.accent}}>{dayLog.length}</div>
              </div>
            </div>

            {/* Hero calorie ring */}
            <div style={{display:"flex",alignItems:"center",gap:20,background:C.card,borderRadius:24,padding:20,border:`1px solid ${C.border}`}}>
              <Ring pct={calPct} size={100} stroke={9} color={ringColor}>
                <div style={{fontSize:22,fontWeight:900,color:C.text,lineHeight:1}}>{fmt(dayTotals.cal)}</div>
                <div style={{fontSize:9,color:C.sub,fontWeight:600}}>kcal</div>
              </Ring>
              <div style={{flex:1}}>
                {defCal&&<div style={{fontSize:13,color:C.sub,marginBottom:10}}>
                  {defCal-fmt(dayTotals.cal)>0
                    ?<><span style={{color:C.green,fontWeight:700}}>{defCal-fmt(dayTotals.cal)}</span> kcal remaining</>
                    :<><span style={{color:C.red,fontWeight:700}}>{fmt(dayTotals.cal)-defCal}</span> kcal over budget</>}
                </div>}
                {[["💪",dayTotals.protein+"g","Protein",C.accent2],["🍚",dayTotals.carbs+"g","Carbs",C.yellow],["🧈",dayTotals.fat+"g","Fat",C.red]].map(([ic,v,l,c])=>(
                  <div key={l} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <span style={{fontSize:11}}>{ic}</span>
                    <div style={{flex:1,background:C.dim,borderRadius:99,height:4}}>
                      <div style={{width:Math.min(100,(parseFloat(v)/100)*100)+"%",height:4,background:c,borderRadius:99}}/>
                    </div>
                    <span style={{fontSize:12,fontWeight:700,color:C.text,minWidth:34}}>{fmt(parseFloat(v))}g</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Add food */}
          <div style={{padding:"0 16px"}}>
            <Card>
              <div style={{fontWeight:700,marginBottom:12,fontSize:15,color:C.text}}>＋ Add Food</div>
              <Input placeholder="🔍 Search food..." value={search} onChange={e=>{setSearch(e.target.value);setSelFood(null);}}/>
              {search&&!selFood&&(
                <div style={{maxHeight:180,overflowY:"auto",marginTop:8,background:C.bg2,borderRadius:14,border:`1px solid ${C.border}`}}>
                  {filteredFoods.slice(0,25).map(f=>(
                    <div key={f.id} onClick={()=>{setSelFood(f.id);setSearch(f.name);setQty(1);}}
                      style={{padding:"10px 14px",cursor:"pointer",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:14,fontWeight:500}}>{f.name}</span>
                      <span style={{fontSize:12,color:C.accent,fontWeight:600}}>{f.cal} kcal</span>
                    </div>
                  ))}
                </div>
              )}
              {prevFood&&(

                <div style={{background:`${C.accent}15`,borderRadius:14,padding:"12px 14px",border:`1px solid ${C.accent}33`}}>
                  <div style={{fontSize:13,color:C.sub}}>To lose <span style={{color:C.text,fontWeight:700}}>{kgToLose} kg</span> at 0.45kg/week:</div>
                  <div style={{fontSize:20,fontWeight:900,color:C.accent,marginTop:4}}>{weeksNeeded} weeks <span style={{fontSize:14,color:C.sub,fontWeight:400}}>({(weeksNeeded/4.3).toFixed(1)} months)</span></div>
                </div>
              )}
              <div style={{fontSize:10,color:C.dim,marginTop:12}}>Mifflin-St Jeor × 1.375 (light activity). −500 kcal/day = ~0.45 kg/week loss.</div>
            </Card>
          )}
        </div>
      )}

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:`${C.bg2}f0`,backdropFilter:"blur(20px)",borderTop:`1px solid ${C.border}`,display:"flex",padding:"8px 0 12px",zIndex:99}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"4px 0"}}>
            <div style={{width:44,height:34,borderRadius:12,background:tab===t.id?`${C.accent}22`:"none",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",boxShadow:tab===t.id?`0 0 16px ${C.accent}33`:"none"}}>
              <span style={{fontSize:18}}>{t.ic}</span>
            </div>
            <span style={{fontSize:10,fontWeight:tab===t.id?700:400,color:tab===t.id?C.accent:C.sub}}>{t.id}</span>
          </button>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
